<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Orange Twist">
  <defs>
    <linearGradient id="ot" x1="14" y1="14" x2="82" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF8A3D"/>
      <stop offset="1" stop-color="#F2570B"/>
    </linearGradient>
  </defs>
  <rect width="96" height="96" rx="22" fill="#FFF7F1"/>
  <!-- twist: two interlocking arcs forming an O -->
  <path d="M48 22c14.36 0 26 11.64 26 26 0 8.4-3.98 15.86-10.16 20.62"
        stroke="url(#ot)" stroke-width="9" stroke-linecap="round"/>
  <path d="M48 74c-14.36 0-26-11.64-26-26 0-8.4 3.98-15.86 10.16-20.62"
        stroke="url(#ot)" stroke-width="9" stroke-linecap="round"/>
  <!-- center twist knot -->
  <circle cx="48" cy="48" r="8.5" fill="url(#ot)"/>
  <circle cx="48" cy="48" r="3.4" fill="#FFF7F1"/>
</svg>
